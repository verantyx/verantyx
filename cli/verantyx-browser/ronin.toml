# Ronin Agent Configuration
# Generated by `ronin init`

[agent]
model       = "qwen2.5:1.5b"
max_steps   = 12
hitl        = true
language    = "ja"
cloud_fallback = "browser_hitl"

[ollama]
host = "127.0.0.1"
port = 11434

[memory]
auto_inject      = true
front_max_tokens = 4096

[sandbox]
timeout_secs   = 60
allow_escape   = true
