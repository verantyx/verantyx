<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verantyx - Secure Login</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: #1e293b; padding: 2rem; border-radius: 1rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); width: 400px; }
        h1 { margin-bottom: 1.5rem; font-size: 1.5rem; font-weight: 600; text-align: center; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.875rem; color: #94a3b8; }
        input { width: 100%; padding: 0.75rem; border-radius: 0.5rem; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 0.75rem; border-radius: 0.5rem; background: #3b82f6; color: white; font-weight: 600; border: none; cursor: pointer; margin-top: 1rem; }
        button:hover { background: #2563eb; }
        .footer { margin-top: 1.5rem; text-align: center; font-size: 0.75rem; color: #64748b; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Verantyx Login</h1>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="ai@verantyx.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password">
        </div>
        <button id="login-btn">Sign In</button>
        <div class="footer">
            Autonomous Browser Engine - Phase 3 Milestone
        </div>
    </div>
    <script>
        document.getElementById('login-btn').addEventListener('click', () => {
            console.log("Login button clicked!");
            alert("Login successful (Mock)");
        });
    </script>
</body>
</html>
