name: 🚀 Release DMG

on:
  push:
    tags:
      - 'v*.*.*'        # v1.0.0, v1.2.3 などのタグで自動発火
  workflow_dispatch:    # 手動実行も可能
    inputs:
      version:
        description: 'Release version (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

permissions:
  contents: write       # GitHub Release 作成に必要

jobs:
  build-and-release:
    name: Build & Package DMG
    runs-on: macos-15   # Apple Silicon (M1/M2) runner

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Select Xcode version ──────────────────────────────────────────
      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      # ── 3. Determine version ─────────────────────────────────────────────
      - name: Set version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # ── 4. Build Release .app ────────────────────────────────────────────
      - name: Build Release
        working-directory: VerantyxIDE
        run: |
          xcodebuild \
            -scheme Verantyx \
            -configuration Release \
            -destination "platform=macOS" \
            CODE_SIGN_STYLE="Manual" \
            CODE_SIGN_IDENTITY="-" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            ONLY_ACTIVE_ARCH=NO \
            BUILD_DIR="$(pwd)/build" \
            build | grep -E "error:|warning:|SUCCEEDED|FAILED"

      # ── 5. Find .app and sign ad-hoc ─────────────────────────────────────
      - name: Find and sign app
        working-directory: VerantyxIDE
        run: |
          APP_PATH=$(find build -name "Verantyx.app" -maxdepth 8 | head -1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV
          echo "Found: $APP_PATH"
          xattr -cr "$APP_PATH"
          codesign --force --deep --sign "-" --options runtime "$APP_PATH"
          echo "Ad-hoc signed"

      # ── 6. Create DMG ────────────────────────────────────────────────────
      - name: Create DMG
        working-directory: VerantyxIDE
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          DMG_NAME="VerantyxIDE-${VERSION}"

          mkdir -p dist/.staging
          cp -R "$APP_PATH" "dist/.staging/Verantyx.app"

          hdiutil create \
            -srcfolder "dist/.staging" \
            -volname "Verantyx IDE ${VERSION}" \
            -fs HFS+ \
            -format UDRW \
            -size 512m \
            "dist/.tmp_${DMG_NAME}.dmg"

          # Mount and add Applications symlink
          hdiutil attach "dist/.tmp_${DMG_NAME}.dmg" \
            -mountpoint "/Volumes/VerantyxIDE" \
            -noautoopen -quiet
          ln -sf /Applications "/Volumes/VerantyxIDE/Applications"
          sleep 1
          hdiutil detach "/Volumes/VerantyxIDE" -quiet

          # Compress
          hdiutil convert "dist/.tmp_${DMG_NAME}.dmg" \
            -format UDZO \
            -imagekey "zlib-level=9" \
            -o "dist/${DMG_NAME}.dmg"

          rm -f "dist/.tmp_${DMG_NAME}.dmg"
          rm -rf "dist/.staging"

          echo "DMG_PATH=VerantyxIDE/dist/${DMG_NAME}.dmg" >> $GITHUB_ENV
          echo "DMG_NAME=${DMG_NAME}" >> $GITHUB_ENV
          ls -lh "dist/${DMG_NAME}.dmg"

      # ── 7. Generate SHA256 checksum ───────────────────────────────────────
      - name: Generate checksum
        working-directory: VerantyxIDE/dist
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          shasum -a 256 "VerantyxIDE-${VERSION}.dmg" > "VerantyxIDE-${VERSION}.dmg.sha256"
          cat "VerantyxIDE-${VERSION}.dmg.sha256"

      # ── 8. Create GitHub Release ──────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || format('v{0}', steps.version.outputs.VERSION) }}
          name: "Verantyx IDE v${{ steps.version.outputs.VERSION }}"
          body: |
            ## 🧠 Verantyx IDE v${{ steps.version.outputs.VERSION }}

            AI Memory Refresh System — ローカル LLM (MLX / Ollama) + 長期記憶エージェント

            ### 📦 インストール方法

            1. **`VerantyxIDE-${{ steps.version.outputs.VERSION }}.dmg`** をダウンロード
            2. DMG を開いて `Verantyx.app` を **Applications** フォルダにドラッグ
            3. **初回起動時のゲートキーパー回避:**
               - Finder で `Verantyx.app` を**右クリック** → **「開く」** をクリック
               - 「開発元不明」ダイアログで **「開く」** を選択
               - または: `xattr -d com.apple.quarantine /Applications/Verantyx.app`

            ### 必要環境
            - macOS 14 Sonoma 以降
            - Apple Silicon (M1/M2/M3/M4) 推奨
            - [Ollama](https://ollama.ai) または MLX モデル (任意)

            ### Verantyx Cortex (推奨)
            AI の長期記憶を有効化するには:
            ```bash
            npx -y @verantyx/cortex setup
            ```

            ### SHA256 チェックサム
            ```
            $(cat VerantyxIDE/dist/VerantyxIDE-${{ steps.version.outputs.VERSION }}.dmg.sha256)
            ```
          files: |
            VerantyxIDE/dist/VerantyxIDE-${{ steps.version.outputs.VERSION }}.dmg
            VerantyxIDE/dist/VerantyxIDE-${{ steps.version.outputs.VERSION }}.dmg.sha256
          draft: false
          prerelease: false
