name: Verantyx
options:
  bundleIdPrefix: com.verantyx
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.verantyx.ide
    PRODUCT_NAME: Verantyx
    # Disable App Sandbox for full filesystem access
    ENABLE_APP_SANDBOX: NO
    CODE_SIGN_ENTITLEMENTS: ""

packages:
  mlx-swift:
    url: https://github.com/ml-explore/mlx-swift
    from: "0.21.0"
  mlx-swift-examples:
    url: https://github.com/ml-explore/mlx-swift-examples
    from: "2.21.0"
  Hub:
    url: https://github.com/huggingface/swift-transformers
    from: "0.1.15"

targets:
  Verantyx:
    type: application
    platform: macOS
    sources:
      - path: Sources/Verantyx
    resources:
      - path: Resources
    entitlements:
      path: Sources/Verantyx/Verantyx.entitlements
    settings:
      base:
        INFOPLIST_FILE: Sources/Verantyx/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.verantyx.ide
        ENABLE_APP_SANDBOX: NO
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
    dependencies:
      - package: mlx-swift
        product: MLX
      - package: mlx-swift
        product: MLXRandom
      - package: mlx-swift-examples
        product: MLXLLM
      - package: Hub
        product: Transformers
