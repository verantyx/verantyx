<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalkiePress - 1930s AI Newspaper</title>
    <style>
        body {
            background-color: #2c241b;
            color: #f4ecd8;
            font-family: 'Times New Roman', serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 80%;
            max-width: 900px;
            margin-top: 50px;
        }
        h1.title {
            text-align: center;
            font-size: 3em;
            border-bottom: 2px solid #f4ecd8;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .input-box {
            background-color: #3b2f2f;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        textarea {
            width: 100%;
            height: 100px;
            background-color: #f4ecd8;
            color: #2c241b;
            font-family: monospace;
            font-size: 1.1em;
            padding: 10px;
            border: 1px solid #1a1a1a;
            box-sizing: border-box;
            border-radius: 3px;
        }
        button {
            background-color: #8c2020;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.2em;
            cursor: pointer;
            margin-top: 10px;
            width: 100%;
            border-radius: 3px;
            font-family: 'Times New Roman', serif;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #a32727;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
        }
        .checkbox-container {
            margin-top: 10px;
            display: flex;
            align-items: center;
        }
        #output {
            margin-top: 30px;
            margin-bottom: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: #f4ecd8;
        }
        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
            font-style: italic;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="title">TalkiePress - 1930s Edition</h1>
    
    <div class="input-box">
        <label for="newsInput"><strong>Transmit Modern News to the Telegraph Office:</strong></label><br><br>
        <textarea id="newsInput" placeholder="e.g. A new AI model was released by OpenAI today..."></textarea>
        
        <div class="checkbox-container">
            <input type="checkbox" id="hybridMode" checked>
            <label for="hybridMode">Use Hybrid M1 Max Tunneling (Ollama + Transformers)</label>
        </div>
        
        <button id="generateBtn" onclick="generateNews()">Print the Paper</button>
        <div class="loader" id="loader">Transmitting via telegraph... Setting mechanical dials... (This may take a moment)</div>
    </div>

    <div id="output"></div>
</div>

<script>
    async function generateNews() {
        const text = document.getElementById("newsInput").value;
        const hybrid = document.getElementById("hybridMode").checked;
        const btn = document.getElementById("generateBtn");
        const loader = document.getElementById("loader");
        const output = document.getElementById("output");
        
        if (!text.trim()) return alert("Please enter news text.");
        
        btn.disabled = true;
        loader.style.display = "block";
        output.innerHTML = "";
        
        try {
            const res = await fetch("/api/generate", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ news_text: text, use_hybrid: hybrid })
            });
            
            const data = await res.json();
            if (res.ok) {
                output.innerHTML = data.html;
            } else {
                output.innerHTML = `<div style="padding: 20px; color: red;">Error: ${data.detail}</div>`;
            }
        } catch (e) {
            output.innerHTML = `<div style="padding: 20px; color: red;">Network Error: ${e.message}</div>`;
        }
        
        btn.disabled = false;
        loader.style.display = "none";
    }
</script>

</body>
</html>
